<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Financial Data Processor API Architecture Diagram">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 16; }
      .engine { fill: #eef2ff; stroke: #3730a3; stroke-width: 2; rx: 16; }
      .storage { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 16; }
      .output { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 16; }
      .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 18px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 14px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="600" y="45" text-anchor="middle" class="title">Financial Data Processor API — Architecture</text>

  <rect x="40" y="130" width="190" height="95" class="box"/>
  <text x="135" y="165" text-anchor="middle" class="label">Client</text>
  <text x="135" y="190" text-anchor="middle" class="small">Swagger / Browser</text>
  <text x="135" y="210" text-anchor="middle" class="small">POST CSV Upload</text>

  <rect x="295" y="125" width="210" height="105" class="box"/>
  <text x="400" y="160" text-anchor="middle" class="label">FastAPI Layer</text>
  <text x="400" y="185" text-anchor="middle" class="small">app/main.py</text>
  <text x="400" y="205" text-anchor="middle" class="small">HTTP + JSON</text>

  <rect x="570" y="115" width="235" height="125" class="engine"/>
  <text x="687" y="150" text-anchor="middle" class="label">Processing Engine</text>
  <text x="687" y="176" text-anchor="middle" class="small">src/processor.py</text>
  <text x="687" y="196" text-anchor="middle" class="small">reader • validator</text>
  <text x="687" y="216" text-anchor="middle" class="small">metrics • reporter</text>

  <rect x="870" y="80" width="235" height="95" class="storage"/>
  <text x="987" y="115" text-anchor="middle" class="label">Uploaded Files</text>
  <text x="987" y="140" text-anchor="middle" class="small">data/uploads/</text>

  <rect x="870" y="215" width="235" height="105" class="output"/>
  <text x="987" y="250" text-anchor="middle" class="label">Output Files</text>
  <text x="987" y="275" text-anchor="middle" class="small">processed CSV</text>
  <text x="987" y="295" text-anchor="middle" class="small">financial report TXT</text>

  <rect x="570" y="350" width="235" height="95" class="box"/>
  <text x="687" y="385" text-anchor="middle" class="label">JSON Response</text>
  <text x="687" y="410" text-anchor="middle" class="small">KPIs</text>
  <text x="687" y="430" text-anchor="middle" class="small">validation summary + preview</text>

  <path d="M230 178 L295 178" class="arrow"/>
  <path d="M505 178 L570 178" class="arrow"/>
  <path d="M805 145 L870 128" class="arrow"/>
  <path d="M805 205 L870 260" class="arrow"/>
  <path d="M870 285 C810 330 765 355 805 398" class="arrow"/>
  <path d="M570 398 C465 400 405 300 405 232" class="arrow"/>
</svg>
